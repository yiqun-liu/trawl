# .trawl.toml — project-level config for trawl itself
# Exclude docs and test fixtures from scanning, since they contain
# TODO/GOAL TRACKER patterns used as examples, not real work items.
# README.md is also excluded: its prose contains literal keyword names
# (TODO/FIXME/HACK/XXX/BUG/NOTE) as documentation, which would otherwise
# surface as false-positive inline tasks when trawl scans itself.

[scan]
exclude = ["docs/", "tests/fixtures/", "README.md"]
